<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser</title>
<link rel="stylesheet" href="../css/style.css">

<style>
  body {
    margin: 0;
    background: #0d0d0f;
    color: white;
    font-family: sans-serif;
  }

  .app-header {
    background: #1a1a1d;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
  }

  .app-header a {
    color: white;
    text-decoration: none;
  }

  .tabs {
    display: flex;
    background: #1a1a1d;
    padding: 6px;
    gap: 6px;
  }

  .tab {
    padding: 6px 10px;
    background: #333;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .tab.active {
    background: #2196f3;
  }

  .url-bar {
    display: flex;
    gap: 6px;
    padding: 8px;
    background: #1a1a1d;
  }

  .url-input {
    flex: 1;
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: #2a2a2d;
    color: white;
  }

  iframe {
    width: 100%;
    height: calc(100vh - 160px);
    border: none;
    background: white;
  }
</style>
</head>

<body>

<div class="app-header">
  <span>Browser</span>
  <a href="../index.html">← Back</a>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Tab 1</div>
  <div class="tab" onclick="switchTab(1)">Tab 2</div>
  <div class="tab" onclick="switchTab(2)">Tab 3</div>
</div>

<div class="url-bar">
  <input id="url" class="url-input" type="text" placeholder="Enter URL...">
  <button onclick="go()">Go</button>
</div>

<iframe id="view0"></iframe>
<iframe id="view1" style="display:none"></iframe>
<iframe id="view2" style="display:none"></iframe>

<script>
let currentTab = 0;

function switchTab(n) {
  currentTab = n;

  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", i === n);
  });

  document.querySelectorAll("iframe").forEach((f, i) => {
    f.style.display = i === n ? "block" : "none";
  });
}

function go() {
  let url = document.getElementById("url").value;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  document.getElementById("view" + currentTab).src = url;
}
</script>

</body>
</html>
