<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser</title>
<link rel="stylesheet" href="../css/style.css">

<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --header: #e0e0e0;
  }

  body.dark {
    --bg: #0d0d0f;
    --text: #ffffff;
    --header: #1a1a1d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    margin: 0;
    font-family: sans-serif;
  }

  .tabs {
    display: flex;
    background: var(--header);
    padding: 6px;
    gap: 6px;
  }

  .tab {
    padding: 6px 10px;
    background: #444;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .tab.active {
    background: #2196f3;
  }

  .url-bar {
    display: flex;
    gap: 6px;
    padding: 8px;
    background: var(--header);
  }

  .url-input {
    flex: 1;
    padding: 6px;
    border-radius: 6px;
    border: none;
  }

  iframe {
    width: 100%;
    height: calc(100vh - 160px);
    border: none;
    background: white;
  }

  body.dark iframe {
    background: #000;
  }

  .app-header button {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
  }
</style>
</head>
<body class="dark">

<div class="app-window">
  <div class="app-header">
    <span>Browser</span>
    <a class="back" href="../index.html">← Back</a>
    <button onclick="toggleDark()">🌙</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Tab 1</div>
    <div class="tab" onclick="switchTab(1)">Tab 2</div>
    <div class="tab" onclick="switchTab(2)">Tab 3</div>
  </div>

  <div class="url-bar">
    <input id="url" class="url-input" type="text" placeholder="Enter URL...">
    <button onclick="go()">Go</button>
  </div>

  <iframe id="view0"></iframe>
  <iframe id="view1" style="display:none"></iframe>
  <iframe id="view2" style="display:none"></iframe>

</div>

<script>
let currentTab = 0;

function switchTab(n) {
  currentTab = n;

  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", i === n);
  });

  document.querySelectorAll("iframe").forEach((f, i) => {
    f.style.display = i === n ? "block" : "none";
  });
}

function go() {
  let url = document.getElementById("url").value;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  document.getElementById("view" + currentTab).src = url;
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
