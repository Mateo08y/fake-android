<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messages</title>
<link rel="stylesheet" href="../css/style.css">

<style>
  body {
    margin: 0;
    background: #0d0d0f;
    color: white;
    font-family: sans-serif;
  }

  .app-header {
    background: #1a1a1d;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
  }

  .app-header a {
    color: white;
    text-decoration: none;
    font-size: 16px;
  }

  #chat {
    padding: 12px;
    height: calc(100vh - 150px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 70%;
    font-size: 15px;
    line-height: 1.3;
  }

  .me {
    background: #2196f3;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }

  .bot {
    background: #2a2a2d;
    color: #ddd;
    margin-right: auto;
    border-bottom-left-radius: 4px;
  }

  .input-bar {
    display: flex;
    padding: 10px;
    background: #1a1a1d;
    gap: 8px;
  }

  .input-bar input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #2a2a2d;
    color: white;
    font-size: 15px;
  }

  .input-bar button {
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    background: #2196f3;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="app-header">
  <span>Messages</span>
  <a href="../index.html">← Back</a>
</div>

<div id="chat"></div>

<div class="input-bar">
  <input id="msg" type="text" placeholder="Escribe un mensaje...">
  <button onclick="send()">Enviar</button>
</div>

<script>
function send() {
  const text = document.getElementById("msg").value.trim();
  if (!text) return;

  addMessage(text, "me");
  document.getElementById("msg").value = "";

  setTimeout(() => {
    botReply(text);
  }, 600);
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function botReply(userText) {
  let reply = "No entendí eso 😅";

  const t = userText.toLowerCase();

  if (t.includes("hola")) reply = "¡Hola! ¿Qué tal?";
  if (t.includes("como estas")) reply = "Todo bien por aquí, ¿y tú?";
  if (t.includes("que haces")) reply = "Aquí, hablando contigo 😄";
  if (t.includes("adios") || t.includes("bye")) reply = "¡Hasta luego!";

  addMessage(reply, "bot");
}
</script>

</body>
</html>
